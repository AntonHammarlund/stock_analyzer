name: ML Runner Stub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  build-ml-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas

      - name: Generate ML stub scores
        run: |
          python scripts/run_ml_stub.py --output data/ml_scores.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml_scores
          path: data/ml_scores.json
