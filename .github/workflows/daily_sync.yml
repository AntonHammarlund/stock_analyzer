name: Daily sync and report

on:
  schedule:
    - cron: "0 6 * * *"
      timezone: "Europe/Stockholm"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Sync data
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        run: python scripts/sync_data.py

      - name: Sync watchlist (free sources)
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          MARKETSTACK_API_KEY: ${{ secrets.MARKETSTACK_API_KEY }}
        run: python scripts/sync_watchlist.py

      - name: Run daily pipeline
        run: python scripts/run_daily.py --force

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/universe_import.csv data/prices_import.csv data/watchlist.csv data/prices_watchlist.csv reports/latest_report.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily sync output"
          git push
